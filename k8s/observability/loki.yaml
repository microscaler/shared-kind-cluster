apiVersion: v1
kind: Service
metadata:
  name: loki
  labels:
    app: loki
spec:
  # NodePort so the kind extraPortMappings (kind-config.yaml: containerPort 31310 → hostPort 3100)
  # actually back a real listener inside the kind container. Without this, ms02:3100 reaches
  # docker-proxy → kind:31310 → kube-proxy refused (no Service on that NodePort) → connection refused.
  type: NodePort
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: http
      nodePort: 31310
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.4
          args:
            - -config.file=/etc/loki/config.yml
          ports:
            - name: http
              containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          emptyDir: {}
