apiVersion: 1

deleteDatasources: []

datasources:
  # ── Primary metrics backends ──
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "10s"
      httpMethod: POST
    version: 1

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 1000
    version: 1

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    version: 1

  # ── Direct PostgreSQL datasource (for table/lock queries via raw SQL) ──
  - name: PostgreSQL
    uid: postgres
    type: postgres
    access: proxy
    url: postgres.data.svc.cluster.local:5432
    database: hauliage
    user: postgres
    secureJsonData:
      password: postgres
    jsonData:
      postgresVersion: 1500
      sslmode: "disable"
      maxIdleConns: 5
      maxOpenConns: 10
      connMaxLifetime: 14400
      timeInterval: "10s"
    version: 1
