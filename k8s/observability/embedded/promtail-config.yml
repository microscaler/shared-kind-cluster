# Promtail → Loki (namespace observability). Ships pod logs to Loki.
# Aligned with BRRTRouter/k8s/observability/promtail.yaml: two jobs (pods path + container symlinks).
# Lifeguard config/k8s/observability/ does NOT include Promtail — same log gap until Promtail (or equivalent) is applied.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Direct paths under kubelet log root (glob matches container restart files).
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    pipeline_stages:
      - cri: {}
    relabel_configs:
      - action: keep
        regex: ${HOSTNAME}
        source_labels: [__meta_kubernetes_pod_node_name]
      - action: drop
        regex: ^$
        source_labels: [__meta_kubernetes_pod_uid]
      - action: replace
        source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - action: replace
        source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - action: replace
        source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
      - action: replace
        source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
        target_label: __path__
        separator: /
        replacement: /var/log/pods/*$1/*.log

  # Symlinks used by containerd/docker — often what works when the pods path alone is empty on Kind.
  - job_name: kubernetes-containers
    kubernetes_sd_configs:
      - role: pod
    pipeline_stages:
      - cri: {}
    relabel_configs:
      - action: keep
        regex: ${HOSTNAME}
        source_labels: [__meta_kubernetes_pod_node_name]
      - action: drop
        regex: ^$
        source_labels: [__meta_kubernetes_pod_uid]
      - action: replace
        source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - action: replace
        source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - action: replace
        source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
      - action: replace
        source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      - source_labels:
          - __meta_kubernetes_pod_name
          - __meta_kubernetes_namespace
          - __meta_kubernetes_pod_container_name
        target_label: __path__
        separator: ;
        regex: (.*);(.*);(.*)
        replacement: /var/log/containers/$1_$2_$3-*.log
