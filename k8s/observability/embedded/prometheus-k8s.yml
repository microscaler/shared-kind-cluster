# OTEL collector (OTLP → Prometheus exporter :9464) + Hauliage pod /metrics + Postgres exporter.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]

  # Hauliage: pods with prometheus.io/scrape=true (Helm microservices + IoT worker).
  - job_name: kubernetes-hauliage-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - hauliage
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name

  # Postgres (namespace data) — global DB health / connections (not per-app without application_name).
  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter.data.svc.cluster.local:9187"]
