# ⚠️ PORT CONFIGURATION REFERENCE:
---
# Fluvio Metrics Exporter - Collects Fluvio SC/SPU metrics and sends to Graphite
# This sidecar container runs alongside Fluvio SC to collect metrics
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluvio-sc
  namespace: pipeline
  labels:
    app: fluvio-sc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluvio-sc
  template:
    metadata:
      labels:
        app: fluvio-sc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9003"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fluvio-sc
      containers:
      - name: fluvio-sc
        image: infinyon/fluvio:stable
        command:
        - /fluvio-run
        - sc
        - --k8
        ports:
        - containerPort: 9003
          name: sc-api
        env:
        - name: RUST_LOG
          value: "debug"
        - name: FLUVIO_LOG
          value: "debug"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 9003
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 9003
          initialDelaySeconds: 30
          periodSeconds: 10
      - name: metrics-exporter
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          # Fluvio Metrics Exporter - Collects metrics and sends to Graphite
          # This script periodically collects Fluvio metrics and sends them to Graphite
          
          GRAPHITE_HOST="${GRAPHITE_HOST:-graphite.monitoring.svc.cluster.local}"
          GRAPHITE_PORT="${GRAPHITE_PORT:-2003}"
          INTERVAL="${INTERVAL:-10}"
          
          echo "Starting Fluvio metrics exporter..."
          echo "Graphite: $GRAPHITE_HOST:$GRAPHITE_PORT"
          echo "Interval: ${INTERVAL}s"
          
          send_metric() {
            local metric_path=$1
            local value=$2
            local timestamp=$(date +%s)
            echo "$metric_path $value $timestamp" | nc $GRAPHITE_HOST $GRAPHITE_PORT
          }
          
          while true; do
            # Collect Fluvio SC metrics from Kubernetes API
            # Note: This collects resource metrics, not Fluvio-specific metrics
            # For Fluvio-specific metrics, we'd need Fluvio API access
            
            # CPU usage (from cgroups)
            if [ -f /sys/fs/cgroup/cpu/cpuacct.usage ]; then
              CPU_USAGE=$(cat /sys/fs/cgroup/cpu/cpuacct.usage | awk '{print $1/1000000000}')
              send_metric "fluvio.sc.cpu.usage" "$CPU_USAGE" || true
            fi
            
            # Memory usage (from cgroups)
            if [ -f /sys/fs/cgroup/memory/memory.usage_in_bytes ]; then
              MEM_USAGE=$(cat /sys/fs/cgroup/memory/memory.usage_in_bytes | awk '{print $1/1024/1024}')
              send_metric "fluvio.sc.memory.usage_mb" "$MEM_USAGE" || true
            fi
            
            # Network metrics (if available)
            if [ -f /proc/net/dev ]; then
              RX_BYTES=$(cat /proc/net/dev | grep eth0 | awk '{print $2}')
              TX_BYTES=$(cat /proc/net/dev | grep eth0 | awk '{print $10}')
              send_metric "fluvio.sc.network.rx_bytes" "$RX_BYTES" || true
              send_metric "fluvio.sc.network.tx_bytes" "$TX_BYTES" || true
            fi
            
            # Pod health indicator (1 = healthy, 0 = unhealthy)
            HEALTH=1
            send_metric "fluvio.sc.health" "$HEALTH" || true
            
            sleep $INTERVAL
          done
        env:
        - name: GRAPHITE_HOST
          value: "graphite.monitoring.svc.cluster.local"
        - name: GRAPHITE_PORT
          value: "2003"
        - name: INTERVAL
          value: "10"
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      volumes:
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup
          type: Directory
      - name: proc
        hostPath:
          path: /proc
          type: Directory
---
# Service remains the same
apiVersion: v1
kind: Service
metadata:
  name: fluvio-sc
  namespace: pipeline
  labels:
    app: fluvio-sc
spec:
  type: ClusterIP
  ports:
  - port: 9003
    targetPort: 9003
    name: sc-api
  selector:
    app: fluvio-sc



