---
# Pipeline Stack Namespace
# IMPORTANT: This namespace should NOT be deleted during normal operations
# If it gets stuck in "Terminating" state, force remove with:
# kubectl patch namespace pipeline -p '{"metadata":{"finalizers":[]}}' --type=merge
apiVersion: v1
kind: Namespace
metadata:
  name: pipeline
  labels:
    app: pipeline
    managed-by: tilt
  annotations:
    description: "Pipeline stack namespace for Fluvio data streaming"

