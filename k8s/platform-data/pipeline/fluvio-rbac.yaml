# ⚠️ PORT CONFIGURATION REFERENCE:
---
# ServiceAccount for Fluvio SC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluvio-sc
  namespace: pipeline
---
# Referenced by ClusterRoleBinding fluvio-metrics-exporter (same ClusterRole as fluvio-sc).
# The fluvio-sc Deployment runs both SC and metrics sidecar under pod serviceAccountName: fluvio-sc;
# per-container serviceAccountName is not valid in Kubernetes—do not set it on the sidecar.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluvio-metrics-exporter
  namespace: pipeline
---
# ClusterRole with permissions for Fluvio SC to manage Fluvio resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluvio-sc
rules:
# CRD access
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
# Fluvio custom resources
- apiGroups:
  - fluvio.infinyon.com
  resources:
  - "*"
  verbs:
  - "*"
# Kubernetes resources that Fluvio manages
- apiGroups:
  - apps
  resources:
  - statefulsets
  - deployments
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Services
- apiGroups:
  - ""
  resources:
  - services
  - endpoints
  - pods
  - configmaps
  - secrets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Metrics API access for metrics exporter
- apiGroups:
  - metrics.k8s.io
  resources:
  - pods
  - nodes
  verbs:
  - get
  - list
---
# ClusterRoleBinding to grant permissions to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluvio-sc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluvio-sc
subjects:
- kind: ServiceAccount
  name: fluvio-sc
  namespace: pipeline
---
# ClusterRoleBinding for metrics exporter
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluvio-metrics-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluvio-sc
subjects:
- kind: ServiceAccount
  name: fluvio-metrics-exporter
  namespace: pipeline

