# ⚠️ PORT CONFIGURATION REFERENCE:
---
# Streaming Controller (SC) - Manages SPU lifecycle and data stream distribution
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluvio-sc
  namespace: pipeline
  labels:
    app: fluvio-sc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluvio-sc
  template:
    metadata:
      labels:
        app: fluvio-sc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9003"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fluvio-sc
      containers:
      - name: fluvio-sc
        image: infinyon/fluvio:stable
        command:
        - /fluvio-run
        - sc
        - --k8
        ports:
        - containerPort: 9003
          name: sc-api
        env:
        - name: RUST_LOG
          value: "debug"
        - name: FLUVIO_LOG
          value: "debug"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 9003
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 9003
          initialDelaySeconds: 30
          periodSeconds: 10
      - name: metrics-exporter
        image: bitnami/kubectl:latest
        securityContext:
          runAsUser: 0
        command:
        - sh
        - -c
        - |
          # Fluvio Metrics Exporter - Collects Fluvio metrics via Kubernetes API and sends to Graphite
          GRAPHITE_HOST="${GRAPHITE_HOST:-graphite.monitoring.svc.cluster.local}"
          GRAPHITE_PORT="${GRAPHITE_PORT:-2003}"
          INTERVAL="${INTERVAL:-30}"
          NAMESPACE="${NAMESPACE:-pipeline}"
          
          echo "Starting Fluvio metrics exporter..."
          echo "Graphite: $GRAPHITE_HOST:$GRAPHITE_PORT"
          echo "Namespace: $NAMESPACE"
          echo "Interval: ${INTERVAL}s"
          
          send_metric() {
            local metric_path=$1
            local value=$2
            local timestamp=$(date +%s)
            echo "$metric_path $value $timestamp" | nc $GRAPHITE_HOST $GRAPHITE_PORT 2>/dev/null || true
          }
          
          # Wait for Kubernetes API to be accessible
          until kubectl get nodes 2>/dev/null >/dev/null; do
            echo "Waiting for Kubernetes API..."
            sleep 5
          done
          
          sleep 10  # Give Fluvio time to initialize
          
          while true; do
            # Collect Fluvio-specific metrics via Kubernetes API
            # Get Topics count
            TOPICS_COUNT=$(kubectl get topics -n $NAMESPACE --no-headers 2>/dev/null | wc -l | tr -d ' ')
            send_metric "fluvio.sc.topics.count" "${TOPICS_COUNT:-0}"
            
            # Get Partitions count
            PARTITIONS_COUNT=$(kubectl get partitions -n $NAMESPACE --no-headers 2>/dev/null | wc -l | tr -d ' ')
            send_metric "fluvio.sc.partitions.count" "${PARTITIONS_COUNT:-0}"
            
            # Get SPU count
            SPU_COUNT=$(kubectl get spus -n $NAMESPACE --no-headers 2>/dev/null | wc -l | tr -d ' ')
            send_metric "fluvio.sc.spu.count" "${SPU_COUNT:-0}"
            
            # Get SPU status breakdown
            SPU_ONLINE=$(kubectl get spus -n $NAMESPACE -o jsonpath='{.items[*].status}' 2>/dev/null | grep -o "online" | wc -l | tr -d ' ')
            SPU_OFFLINE=$(kubectl get spus -n $NAMESPACE -o jsonpath='{.items[*].status}' 2>/dev/null | grep -o "offline" | wc -l | tr -d ' ')
            send_metric "fluvio.sc.spu.online" "${SPU_ONLINE:-0}"
            send_metric "fluvio.sc.spu.offline" "${SPU_OFFLINE:-0}"
            
            # Get SPU Pod status
            SPU_PODS_READY=$(kubectl get pods -n $NAMESPACE -l app=fluvio-spu --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l | tr -d ' ')
            SPU_PODS_TOTAL=$(kubectl get pods -n $NAMESPACE -l app=fluvio-spu --no-headers 2>/dev/null | wc -l | tr -d ' ')
            send_metric "fluvio.sc.spu.pods.ready" "${SPU_PODS_READY:-0}"
            send_metric "fluvio.sc.spu.pods.total" "${SPU_PODS_TOTAL:-0}"
            
            # Get SC Pod status
            SC_POD_READY=$(kubectl get pods -n $NAMESPACE -l app=fluvio-sc --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l | tr -d ' ')
            send_metric "fluvio.sc.pod.ready" "${SC_POD_READY:-0}"
            
            # Get SmartModules count
            SMARTMODULES_COUNT=$(kubectl get smartmodules -n $NAMESPACE --no-headers 2>/dev/null | wc -l | tr -d ' ')
            send_metric "fluvio.sc.smartmodules.count" "${SMARTMODULES_COUNT:-0}"
            
            # Kubernetes resource metrics for SC pod
            SC_POD=$(kubectl get pods -n $NAMESPACE -l app=fluvio-sc -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            if [ -n "$SC_POD" ]; then
              # CPU usage (from pod metrics)
              CPU_USAGE=$(kubectl top pod -n $NAMESPACE $SC_POD --no-headers 2>/dev/null | awk '{print $2}' | sed 's/m//' || echo "0")
              if [ "$CPU_USAGE" != "0" ] && [ -n "$CPU_USAGE" ]; then
                send_metric "fluvio.sc.resources.cpu.usage_millicores" "$CPU_USAGE"
              fi
              
              # Memory usage (from pod metrics)
              MEM_USAGE=$(kubectl top pod -n $NAMESPACE $SC_POD --no-headers 2>/dev/null | awk '{print $3}' | sed 's/Mi//' || echo "0")
              if [ "$MEM_USAGE" != "0" ] && [ -n "$MEM_USAGE" ]; then
                send_metric "fluvio.sc.resources.memory.usage_mb" "$MEM_USAGE"
              fi
            fi
            
            # Pod health indicator
            send_metric "fluvio.sc.health" "1"
            
            sleep $INTERVAL
          done
        env:
        - name: GRAPHITE_HOST
          value: "graphite.monitoring.svc.cluster.local"
        - name: GRAPHITE_PORT
          value: "2003"
        - name: INTERVAL
          value: "30"
        - name: NAMESPACE
          value: "pipeline"
        volumeMounts:
        - name: cgroup
          mountPath: /sys/fs/cgroup
          readOnly: true
        - name: proc
          mountPath: /proc
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup
          type: Directory
      - name: proc
        hostPath:
          path: /proc
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: fluvio-sc
  namespace: pipeline
  labels:
    app: fluvio-sc
spec:
  type: ClusterIP
  ports:
  - port: 9003
    targetPort: 9003
    name: sc-api
  selector:
    app: fluvio-sc

