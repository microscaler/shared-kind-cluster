# GCP Emulators Namespace
# IMPORTANT: This namespace should NOT be deleted during normal operations
# If it gets stuck in "Terminating" state, force remove with:
# kubectl patch namespace gcp -p '{"metadata":{"finalizers":[]}}' --type=merge
apiVersion: v1
kind: Namespace
metadata:
  name: gcp
  labels:
    app: gcp
    managed-by: tilt
  annotations:
    description: "GCP emulators namespace for local development (Pub/Sub, Datastore, Bigtable, Cloud Functions)"

