# Google Cloud Pub/Sub Emulator
# Provides local Pub/Sub emulation for development and testing
# Official image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pubsub-emulator
  namespace: gcp
  labels:
    app: pubsub-emulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pubsub-emulator
  template:
    metadata:
      labels:
        app: pubsub-emulator
    spec:
      containers:
      - name: pubsub-emulator
        image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
        command:
        - gcloud
        - beta
        - emulators
        - pubsub
        - start
        - --host-port=0.0.0.0:8085
        - --project=pricewhisperer-dev
        ports:
        - containerPort: 8085
          name: pubsub
        env:
        - name: PUBSUB_PROJECT_ID
          value: "pricewhisperer-dev"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8085
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pubsub-emulator
  namespace: gcp
  labels:
    app: pubsub-emulator
spec:
  type: NodePort
  ports:
  - port: 8085
    targetPort: 8085
    nodePort: 30885
    name: pubsub
  selector:
    app: pubsub-emulator

