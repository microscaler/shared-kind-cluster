apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-replica-0-pv-v5
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /var/lib/data/postgres-replica-0-v5
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - kind-control-plane
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-replica-0-data-v5
  namespace: data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-replica-0
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica-0
  template:
    metadata:
      labels:
        app: postgres-replica-0
    spec:
      initContainers:
      - name: basebackup
        image: docker.io/casibbald/postgres:17-duckdb-supabase-v2
        command:
        - sh
        - -c
        - |
          export PGDATA=/var/lib/postgresql/data
          # Wait for primary to accept connections
          until PGPASSWORD=postgres pg_isready -h postgres -p 5432 -U postgres; do sleep 1; done
          if [ -z "$(ls -A $PGDATA)" ]; then
            echo "Waiting 15s for primary to finish initial migrations completely..."
            sleep 15
            PGPASSWORD=postgres pg_basebackup -h postgres -D $PGDATA -U replicator -vP -w -X stream -R
            echo "Basebackup completed"
          else
            echo "Data dir not empty, skipping basebackup"
          fi
          if [ -f "$PGDATA/postgresql.conf" ]; then
             grep -q "duckdb.enable_optimizer" "$PGDATA/postgresql.conf" || echo "duckdb.enable_optimizer = on" >> "$PGDATA/postgresql.conf"
          fi
        volumeMounts:
        - name: storage
          mountPath: /var/lib/postgresql/data
      containers:
      - name: postgres
        image: docker.io/casibbald/postgres:17-duckdb-supabase-v2
        command:
        - sh
        - -c
        - |
          grep -q "^hot_standby" /etc/postgresql/postgresql.conf || echo "hot_standby = on" >> /etc/postgresql/postgresql.conf
          exec docker-entrypoint.sh postgres -D /etc/postgresql
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: postgres
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: PGDATA
          value: /var/lib/postgresql/data
        volumeMounts:
        - name: storage
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - PGPASSWORD=postgres pg_isready -U postgres -d postgres -h 127.0.0.1 -p 5432
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - PGPASSWORD=postgres pg_isready -U postgres -d postgres -h 127.0.0.1 -p 5432
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: postgres-replica-0-data-v5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica-0
  namespace: data
spec:
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app: postgres-replica-0
---
