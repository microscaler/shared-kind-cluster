# ⚠️ PORT CONFIGURATION REFERENCE:
# Pact Broker - Contract Testing Service
# Image runs DB migrations on startup; see comments on pact-postgres.yaml for expected Postgres log noise.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pact-broker
  namespace: data
  labels:
    app: pact-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pact-broker
  template:
    metadata:
      labels:
        app: pact-broker
    spec:
      # K8s injects PACT_BROKER_PORT=tcp://<ip>:9292 for this Service's name; Puma expects a numeric
      # port (pact-foundation/pact_broker#532). Disable service link env injection for this pod.
      enableServiceLinks: false
      containers:
      - name: pact-broker
        image: pactfoundation/pact-broker:latest
        ports:
        - containerPort: 9292
          name: http
        env:
        - name: PACT_BROKER_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: PACT_BROKER_DATABASE_URL
        - name: PACT_BROKER_BASIC_AUTH_USERNAME
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: PACT_BROKER_BASIC_AUTH_USERNAME
        - name: PACT_BROKER_BASIC_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: PACT_BROKER_BASIC_AUTH_PASSWORD
        - name: PACT_BROKER_PUBLIC_HEARTBEAT
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: PACT_BROKER_PUBLIC_HEARTBEAT
        - name: PACT_BROKER_ALLOW_PUBLIC_READ
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: PACT_BROKER_ALLOW_PUBLIC_READ
        - name: PACT_BROKER_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: PACT_BROKER_LOG_LEVEL
        - name: PACT_BROKER_WEBHOOK_HTTP_VERIFY
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: PACT_BROKER_WEBHOOK_HTTP_VERIFY
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
        readinessProbe:
          httpGet:
            path: /
            port: 9292
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 9292
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pact-broker
  namespace: data
  labels:
    app: pact-broker
spec:
  type: ClusterIP
  ports:
  - port: 9292
    targetPort: 9292
    protocol: TCP
    name: http
  selector:
    app: pact-broker

