# see: docs/infrastructure/services-ports.md
#
# ALWAYS check docs/infrastructure/services-ports.md before adding new services or changing ports
# to prevent port conflicts. (postgres-pv and parquet-lake-pv moved to microscaler-supabase)

apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-pv
spec:
  capacity:
    storage: 512Mi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /var/lib/data/redis
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - kind-control-plane
---
