# ⚠️ PORT CONFIGURATION REFERENCE:
# =================================
# For the complete canonical reference of ALL services, ports, NodePorts, and resource allocations,
# see: docs/infrastructure/services-ports.md
#
# ALWAYS check docs/infrastructure/services-ports.md before adding new services or changing ports
# to prevent port conflicts.
#
# Mailpit - Email testing tool for development
# Documentation: https://mailpit.axllent.org/docs/install/docker/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: data
  labels:
    app: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
      annotations:
        prometheus.io/scrape: "true"
    spec:
      containers:
      - name: mailpit
        image: axllent/mailpit:latest
        ports:
        - containerPort: 1025
          name: smtp
        - containerPort: 8025
          name: web
        env:
        - name: MP_DATABASE
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: MAILPIT_DATABASE
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: MAILPIT_TIMEZONE
        volumeMounts:
        - name: mailpit-data
          mountPath: /data
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
            cpu: 200m
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8025
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /livez
            port: 8025
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: mailpit-data
        persistentVolumeClaim:
          claimName: mailpit-storage-pv-claim
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: data
  labels:
    app: mailpit
spec:
  type: NodePort
  ports:
  - port: 1025
    targetPort: 1025
    nodePort: 31025
    protocol: TCP
    name: smtp
  - port: 8025
    targetPort: 8025
    nodePort: 31026
    protocol: TCP
    name: web
  selector:
    app: mailpit

