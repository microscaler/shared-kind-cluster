# MailHog — SMTP capture + web UI for local/email integration tests.
# https://github.com/mailhog/MailHog
# Cluster DNS: mailhog.data.svc.cluster.local (SMTP 1025, UI 8025 — distinct Service from Mailpit).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: data
  labels:
    app: mailhog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          ports:
            - containerPort: 1025
              name: smtp
            - containerPort: 8025
              name: http
          env:
            - name: MH_HOSTNAME
              value: mailhog.data.svc.cluster.local
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: data
  labels:
    app: mailhog
spec:
  type: NodePort
  ports:
    - port: 1025
      targetPort: smtp
      nodePort: 31027
      protocol: TCP
      name: smtp
    - port: 8025
      targetPort: http
      nodePort: 31028
      protocol: TCP
      name: web
  selector:
    app: mailhog
