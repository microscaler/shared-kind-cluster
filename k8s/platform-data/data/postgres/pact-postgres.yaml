# ⚠️ PORT CONFIGURATION REFERENCE:
# Pact Broker Postgres Database
#
# Logs may show ERROR: relation "schema_migrations" / "schema_info" does not exist when Pact Broker
# (Sequel) probes tables before the first migration. That is normal on a fresh DB; the broker image
# runs migrations on startup. Confirm health via `pact-broker` pod logs / HTTP :9292, not only these lines.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pact-postgres
  namespace: data
  labels:
    app: pact-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pact-postgres
  template:
    metadata:
      labels:
        app: pact-postgres
      annotations:
        prometheus.io/scrape: "true"
    spec:
      initContainers:
      - name: create-dirs
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          # Create PostgreSQL data directory
          mkdir -p /var/lib/postgresql/data
          chmod -R 755 /var/lib/postgresql/data
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: storage
          mountPath: /var/lib/postgresql/data
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        # PostgreSQL role names must be ≤63 bytes. Secrets such as generated service IDs can exceed
        # that and cause initdb to fail (FATAL: identifier too long). Use fixed role `pact` — must
        # match readiness/liveness probes and pact-broker `PACT_BROKER_DATABASE_*` (user pact, same password).
        - name: POSTGRES_USER
          value: "pact"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: PACT_POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: PACT_POSTGRES_DB
        - name: PGDATA
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: PACT_POSTGRES_PGDATA
        volumeMounts:
        - name: storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 256Mi
            cpu: 300m
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - pact
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - pact
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: pact-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: pact-postgres
  namespace: data
  labels:
    app: pact-postgres
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: pact-postgres

