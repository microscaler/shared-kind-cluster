# ⚠️ PORT CONFIGURATION REFERENCE:
# Pact Broker - Contract Testing Service
# Image runs DB migrations on startup; see comments on pact-postgres.yaml for expected Postgres log noise.
#
# DB: PACT_BROKER_DATABASE_* only (no PACT_BROKER_DATABASE_URL). Host/port/name are literals below so
# they match Service `pact-postgres` in this namespace (`pact-postgres` resolves via cluster DNS).
# If logs show "pact-<redacted>.data..." and DNS fails, your log viewer may be redacting the substring
# `postgres` inside `pact-postgres` when PACT_POSTGRES_PASSWORD is also `postgres` — verify with:
#   kubectl exec -n data deploy/pact-broker -- printenv PACT_BROKER_DATABASE_HOST
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pact-broker
  namespace: data
  labels:
    app: pact-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pact-broker
  template:
    metadata:
      labels:
        app: pact-broker
    spec:
      # K8s injects PACT_BROKER_PORT=tcp://<ip>:9292 for this Service's name; Puma expects a numeric
      # port (pact-foundation/pact_broker#532). Disable service link env injection for this pod.
      enableServiceLinks: false
      containers:
      - name: pact-broker
        image: pactfoundation/pact-broker:latest
        ports:
        - containerPort: 9292
          name: http
        env:
        - name: PACT_BROKER_DATABASE_ADAPTER
          value: "postgres"
        # Same namespace as this Deployment — short name is enough (ClusterIP Service pact-postgres).
        - name: PACT_BROKER_DATABASE_HOST
          value: "pact-postgres"
        - name: PACT_BROKER_DATABASE_PORT
          value: "5432"
        - name: PACT_BROKER_DATABASE_USERNAME
          value: "pact"
        - name: PACT_BROKER_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: PACT_POSTGRES_PASSWORD
        - name: PACT_BROKER_DATABASE_NAME
          value: "pact"
        - name: PACT_BROKER_DATABASE_SSLMODE
          value: "disable"
        - name: PACT_BROKER_BASIC_AUTH_USERNAME
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: PACT_BROKER_BASIC_AUTH_USERNAME
        - name: PACT_BROKER_BASIC_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: PACT_BROKER_BASIC_AUTH_PASSWORD
        - name: PACT_BROKER_PUBLIC_HEARTBEAT
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: PACT_BROKER_PUBLIC_HEARTBEAT
        - name: PACT_BROKER_ALLOW_PUBLIC_READ
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: PACT_BROKER_ALLOW_PUBLIC_READ
        - name: PACT_BROKER_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: PACT_BROKER_LOG_LEVEL
        - name: PACT_BROKER_WEBHOOK_HTTP_VERIFY
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: PACT_BROKER_WEBHOOK_HTTP_VERIFY
        resources:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 256Mi
            cpu: 300m
        readinessProbe:
          httpGet:
            path: /
            port: 9292
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 9292
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pact-broker
  namespace: data
  labels:
    app: pact-broker
spec:
  # NodePort backs the kind extraPortMapping (containerPort 30929 → hostPort 9292).
  # Verify with: just ms02-cluster-portmap-check (cylon-local-infra).
  type: NodePort
  ports:
  - port: 9292
    targetPort: 9292
    protocol: TCP
    name: http
    nodePort: 30929
  selector:
    app: pact-broker

