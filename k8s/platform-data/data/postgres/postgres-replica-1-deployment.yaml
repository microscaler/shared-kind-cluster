apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-replica-1
  namespace: data
  labels:
    app: postgres-replica-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica-1
  template:
    metadata:
      labels:
        app: postgres-replica-1
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: postgres
          image: docker.io/bitnamilegacy/postgresql:15
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRESQL_REPLICATION_MODE
              value: "slave"
            - name: POSTGRESQL_REPLICATION_USER
              value: "replicator"
            - name: POSTGRESQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: postgres-replication-password
            - name: POSTGRESQL_MASTER_HOST
              value: "postgres"
            - name: POSTGRESQL_MASTER_PORT_NUMBER
              value: "5432"
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: postgres-password
            - name: POSTGRESQL_MASTER_ROOT_USER
              value: "postgres"
            - name: POSTGRESQL_MASTER_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: postgres-password
            - name: POSTGRESQL_MAX_CONNECTIONS
              value: "200"
          volumeMounts:
            - name: data
              mountPath: /bitnami/postgresql
          livenessProbe:
            exec:
              command:
                - /opt/bitnami/postgresql/bin/pg_isready
                - -U
                - postgres
                - -d
                - postgres
                - -h
                - 127.0.0.1
                - -p
                - "5432"
            initialDelaySeconds: 90
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - /opt/bitnami/postgresql/bin/pg_isready
                - -U
                - postgres
                - -d
                - postgres
                - -h
                - 127.0.0.1
                - -p
                - "5432"
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-replica-1-data
