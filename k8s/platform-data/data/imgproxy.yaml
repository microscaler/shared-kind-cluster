# ⚠️ PORT CONFIGURATION REFERENCE:
# =================================
# For the complete canonical reference of ALL services, ports, NodePorts, and resource allocations,
# see: docs/infrastructure/services-ports.md
#
# ALWAYS check docs/infrastructure/services-ports.md before adding new services or changing ports
# to prevent port conflicts.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: imgproxy
  namespace: data
  labels:
    app: imgproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: imgproxy
  template:
    metadata:
      labels:
        app: imgproxy
    spec:
      containers:
      - name: imgproxy
        image: darthsim/imgproxy:v3.8.0
        ports:
        - containerPort: 5001
          name: http
        env:
        - name: IMGPROXY_BIND
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: IMGPROXY_BIND
        - name: IMGPROXY_LOCAL_FILESYSTEM_ROOT
          value: "/"
        - name: IMGPROXY_USE_ETAG
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: IMGPROXY_USE_ETAG
        - name: IMGPROXY_ENABLE_WEBP_DETECTION
          valueFrom:
            configMapKeyRef:
              name: infra-config
              key: IMGPROXY_ENABLE_WEBP_DETECTION
        volumeMounts:
        - name: storage
          mountPath: /var/lib/storage
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          exec:
            command:
            - imgproxy
            - health
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
            - imgproxy
            - health
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: minio-storage
---
apiVersion: v1
kind: Service
metadata:
  name: imgproxy
  namespace: data
  labels:
    app: imgproxy
spec:
  type: ClusterIP
  ports:
  - port: 5001
    targetPort: 5001
    protocol: TCP
    name: http
  selector:
    app: imgproxy

