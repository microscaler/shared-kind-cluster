# ⚠️ PORT CONFIGURATION REFERENCE:
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
      annotations:
        prometheus.io/scrape: "true"
    spec:
      initContainers:
      - name: create-dirs
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          # Create MinIO data directory
          mkdir -p /data
          
          # Set ownership and permissions (MinIO runs as UID 1000)
          chown -R 1000:1000 /data
          chmod -R 775 /data
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: storage
          mountPath: /data
      containers:
      - name: minio
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
        command:
        - /bin/sh
        - -c
        - |
          minio server /data --address "0.0.0.0:9000" --console-address "0.0.0.0:9001"
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: MINIO_ROOT_PASSWORD
        # MinIO logs to stdout/stderr by default, Promtail will collect these automatically
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
        volumeMounts:
        - name: storage
          mountPath: /data
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: minio-storage
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: data
spec:
  type: NodePort
  ports:
  - port: 9000
    targetPort: 9000
    nodePort: 30900
    name: api
  - port: 9001
    targetPort: 9001
    nodePort: 30901
    name: console
  selector:
    app: minio

