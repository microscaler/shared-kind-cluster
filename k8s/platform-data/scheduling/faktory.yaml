# For the complete canonical reference of ALL services, ports, NodePorts, and resource allocations,
# see: docs/infrastructure/services-ports.md
#
# ALWAYS check docs/infrastructure/services-ports.md before adding new services or changing ports
# to prevent port conflicts.
#
# Faktory Server Deployment
# Based on: https://github.com/contribsys/faktory/wiki/Kubernetes-Deployment-Example
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: faktory-server
  namespace: scheduling
  labels:
    app: faktory-server
spec:
  replicas: 1
  strategy:
    type: Recreate  # Only one instance of Faktory should run
  selector:
    matchLabels:
      app: faktory-server
  template:
    metadata:
      labels:
        app: faktory-server
      annotations:
        prometheus.io/scrape: "true"
    spec:
      shareProcessNamespace: true
      terminationGracePeriodSeconds: 10
      containers:
      # Config watcher sidecar - watches for config changes and sends SIGHUP to Faktory
      - name: faktory-server-config-watcher
        image: busybox:1.36
        command:
        - sh
        - "-c"
        - |
          sum() {
            current=$(find /conf -type f -exec md5sum {} \; | sort -k 2 | md5sum)
          }
          sum
          last="$current"
          while true; do
            sum
            if [ "$current" != "$last" ]; then
              pid=$(pidof faktory)
              echo "$(date -Iseconds) [conf.d] changes detected - signaling Faktory with pid=$pid"
              kill -HUP "$pid"
              last="$current"
            fi
            sleep 1
          done
        volumeMounts:
        - name: faktory-server-configs-volume
          mountPath: "/conf"
        resources:
          requests:
            memory: 32Mi
            cpu: 50m
          limits:
            memory: 64Mi
            cpu: 100m
      # Faktory server container
      - image: contribsys/faktory:1.2.0
        name: faktory-server
        command:
        - "/faktory"
        - "-b"
        - ":7419"
        - "-w"
        - ":7420"
        - "-e"
        - "development"
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: faktory-server-configmap
        ports:
        - containerPort: 7419
          name: faktory
        - containerPort: 7420
          name: dashboard
        volumeMounts:
        - name: faktory-server-configs-volume
          mountPath: "/etc/faktory/conf.d"
        - name: faktory-server-storage-volume
          mountPath: "/var/lib/faktory/db"
        resources:
          requests:
            memory: 256Mi
            cpu: 200m
          limits:
            memory: 512Mi
            cpu: 500m
        readinessProbe:
          tcpSocket:
            port: 7419
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 7419
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: faktory-server-configs-volume
        configMap:
          name: faktory-server-configmap
      - name: faktory-server-storage-volume
        persistentVolumeClaim:
          claimName: faktory-server-storage-pv-claim
---
apiVersion: v1
kind: Service
metadata:
  name: faktory-server
  namespace: scheduling
spec:
  type: NodePort
  ports:
  - port: 7419
    targetPort: 7419
    nodePort: 30419
    name: faktory
    protocol: TCP
  - port: 7420
    targetPort: 7420
    nodePort: 30420
    name: dashboard
    protocol: TCP
  selector:
    app: faktory-server
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: faktory-server-configmap
  namespace: scheduling
data:
  # Example cron configuration
  cron.toml: |2
    # [[cron]]
    # schedule = "*/1 * * * *"
    # 
    # [cron.job]
    # queue = "default"
    # reserve_for = 60
    # retry = -1
    # type = "Cron::SomeRandomCron"

  # Example throttles configuration
  throttles.toml: |2
    # [throttles.default]
    # concurrency = 1
    # timeout = 60

  # Example statsd configuration (uncomment and configure if using StatsD)
  # statsd.toml: |2
  #   [statsd]
  #   location = "datadog-agent-svc.default.svc.cluster.local:8125"
  #   namespace = "faktory"
  #   tags = ["env:production"]

