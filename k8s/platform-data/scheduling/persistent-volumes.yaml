# Persistent Volumes for Faktory
# Note: PVs should be created once and not managed by Tilt
# They have Retain policy and can't be easily deleted when bound to PVCs
# Create them manually: kubectl apply -f k8s/scheduling/persistent-volumes.yaml

apiVersion: v1
kind: PersistentVolume
metadata:
  name: faktory-server-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /var/lib/scheduling/faktory
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - kind-control-plane

