---
# Scheduling Stack Namespace
# IMPORTANT: This namespace should NOT be deleted during normal operations
# If it gets stuck in "Terminating" state, force remove with:
# kubectl patch namespace scheduling -p '{"metadata":{"finalizers":[]}}' --type=merge
apiVersion: v1
kind: Namespace
metadata:
  name: scheduling
  labels:
    app: scheduling
    managed-by: tilt
  annotations:
    description: "Scheduling stack namespace for Faktory job scheduler"

